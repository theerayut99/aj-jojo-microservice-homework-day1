# ==============================================================================
# Factor 3: Config — Store config in the environment
# Factor 7: Port Binding — Export services via port binding
# All values use ${ENV_VAR:default} syntax — override via environment variables
# ==============================================================================

# Factor 7: Port binding
server.port=${PORT:8080}

# Factor 3: Config — service configuration from environment
service.name=${SERVICE_NAME:loan-service}
service.version=${SERVICE_VERSION:1.2.0}
service.environment=${SERVICE_ENV:production}

# Factor 9: Disposability — graceful shutdown (drain connections before stopping)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.example.loanhello=INFO

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
