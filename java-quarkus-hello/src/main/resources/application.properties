# ==============================================================================
# Factor 3: Config — Store config in the environment
# Factor 7: Port Binding — Export services via port binding
# All values use ${ENV_VAR:default} syntax — override via environment variables
# ==============================================================================

# Factor 7: Port binding
quarkus.http.port=${PORT:8080}

# Factor 3: Config — service configuration from environment
service.name=${SERVICE_NAME:loan-service}
service.version=${SERVICE_VERSION:1.2.0}
service.environment=${SERVICE_ENV:production}

# Factor 9: Disposability — graceful shutdown
quarkus.shutdown.timeout=10s

# Logging — Factor 11
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.console.json=true
quarkus.log.console.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

# Swagger / OpenAPI
quarkus.smallrye-openapi.info-title=Loan Service API
quarkus.smallrye-openapi.info-description=Quarkus microservice that returns a sample loan-service JSON log entry
quarkus.smallrye-openapi.info-version=1.2.0
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger

# Health checks
quarkus.smallrye-health.ui.enable=true
